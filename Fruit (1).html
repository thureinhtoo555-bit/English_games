<!DOCTYPE html>
<html lang="en"><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium 3D Wooden Matching Studio</title>
    <style>
        /* CSS: Main Layout */
        html,
        body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow-x: hidden;
        }

        body {
            background-color: #1a252f;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* Creator Section */
        .creator-section {
            background-color: white;
            width: 90%;
            max-width: 700px;
            margin: 20px auto;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            text-align: left;
            box-sizing: border-box;
        }

        h1 {
            color: #2c3e50;
            margin-top: 0;
            margin-bottom: 5px;
            text-align: center;
        }

        .subtitle {
            color: #7f8c8d;
            margin-bottom: 25px;
            text-align: center;
        }

        .word-pair-row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 12px;
            background: #f8fafc;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #e2e8f0;
        }

        .pair-number {
            font-weight: bold;
            color: #64748b;
            min-width: 60px;
        }

        .word-pair-row input {
            flex: 1;
            padding: 10px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            font-size: 14px;
        }

        /* Buttons Styles */
        .btn {
            padding: 12px 20px;
            font-size: 16px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            border: none;
            transition: background 0.2s, transform 0.1s;
        }

        .btn:active {
            transform: scale(0.98);
        }

        .btn-add {
            background-color: #3498db;
            color: white;
            margin-bottom: 20px;
        }

        .btn-add:hover {
            background-color: #2980b9;
        }

        .btn-generate {
            background-color: #2ecc71;
            color: white;
            width: 100%;
            font-size: 18px;
            margin-top: 15px;
        }

        .btn-generate:hover {
            background-color: #27ae60;
        }

        .btn-back {
            background-color: #7f8c8d;
            color: white;
            padding: 10px 20px;
            font-size: 16px;
        }

        .btn-back:hover {
            background-color: #64748b;
        }

        .btn-save-file {
            background-color: #e67e22;
            color: white;
            padding: 10px 20px;
            font-size: 16px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
        }

        .btn-save-file:hover {
            background-color: #d35400;
        }

        .btn-delete {
            background-color: #e74c3c;
            color: white;
            padding: 10px;
            border-radius: 6px;
        }

        .btn-delete:hover {
            background-color: #c0392b;
        }

        /* Game Section */
        .game-section {
            display: none;
            width: 100%;
            height: 100%;
            box-sizing: border-box;
            position: relative;
        }

        /* Wooden Chessboard Background */
        .game-arena {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            box-sizing: border-box;
            background-color: #cd853f;
            background-image:
                linear-gradient(45deg, #8b4513 25%, transparent 25%),
                linear-gradient(-45deg, #8b4513 25%, transparent 25%),
                linear-gradient(45deg, transparent 75%, #8b4513 75%),
                linear-gradient(-45deg, transparent 75%, #8b4513 75%);
            background-size: 100px 100px;
            box-shadow: inset 0 0 100px rgba(0, 0, 0, 0.6);
        }

        .match-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 25px;
            width: 90%;
            max-width: 1200px;
            margin: auto;
            perspective: 1200px;
            justify-content: center;
        }

        /* 3D Card Flip Container */
        .card-container {
            height: 140px;
            perspective: 1200px;
            cursor: pointer;
        }

        .card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            text-align: center;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            transform-style: preserve-3d;
            box-shadow: 0 12px 20px rgba(0, 0, 0, 0.5), inset 0 -4px 0 rgba(0, 0, 0, 0.4);
            border-radius: 12px;
        }

        .card-container.is-flipped .card-inner {
            transform: rotateY(180deg);
        }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            box-sizing: border-box;
            padding: 10px;
        }

        /* Card Front - Dark Wood Design */
        .card-front {
            background-color: #4a2711;
            background-image: linear-gradient(0deg, #3d1f0d 0%, #573018 100%);
            color: #f1c40f;
            font-size: 42px;
            text-shadow: 2px 3px 4px rgba(0, 0, 0, 0.6);
            border: 3px solid #2b1407;
            box-shadow: inset 0 2px 5px rgba(255, 255, 255, 0.2);
        }

        /* Card Back */
        .card-back {
            background: linear-gradient(135deg, #1abc9c, #2ecc71);
            color: white;
            font-size: 22px;
            transform: rotateY(180deg);
            word-break: break-word;
            overflow: hidden;
            border: 3px solid #ffffff;
        }

        .card-container.is-matched .card-inner .card-back {
            background: linear-gradient(135deg, #2ecc71, #27ae60);
            animation: pulse 0.5s ease-in-out;
        }

        @keyframes pulse {
            0% {
                transform: rotateY(180deg) scale(1);
            }

            50% {
                transform: rotateY(180deg) scale(1.08);
            }

            100% {
                transform: rotateY(180deg) scale(1);
            }
        }

        .card-back img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            border-radius: 8px;
            background-color: white;
        }

        .game-controls {
            width: 100%;
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 10px;
        }
    </style>
</head>

<body>

    <div id="creatorPage" class="creator-section" style="display: none;">
        <h1>🧩 Premium 3D Wooden Matching Studio</h1>
        <p class="subtitle">Create your game with unlimited words and images in Full-Screen.</p>

        <div id="wordInputsContainer"><div class="word-pair-row" id="pairRow_1">
                <span class="pair-number">Pair 1</span>
                <input type="text" class="input-word-a" placeholder="Word (e.g. Apple)" value="">
                <input type="text" class="input-word-b" placeholder="Definition OR Image URL" value="">
                <button class="btn btn-delete" onclick="deletePairRow(1)">🗑</button>
            </div><div class="word-pair-row" id="pairRow_2">
                <span class="pair-number">Pair 2</span>
                <input type="text" class="input-word-a" placeholder="Word (e.g. Apple)" value="">
                <input type="text" class="input-word-b" placeholder="Definition OR Image URL" value="">
                <button class="btn btn-delete" onclick="deletePairRow(2)">🗑</button>
            </div><div class="word-pair-row" id="pairRow_3">
                <span class="pair-number">Pair 3</span>
                <input type="text" class="input-word-a" placeholder="Word (e.g. Apple)" value="">
                <input type="text" class="input-word-b" placeholder="Definition OR Image URL" value="">
                <button class="btn btn-delete" onclick="deletePairRow(3)">🗑</button>
            </div></div>

        <button class="btn btn-add" onclick="addNewPairRow()">➕ Add New Pair</button>
        <button class="btn btn-generate" onclick="generateGame()">Generate Full-Screen Game 🚀</button>
    </div>

    <div id="gamePage" class="game-section" style="display: block;">
        <div class="game-arena">
            <div class="match-container" id="gameBoard"><div class="card-container is-flipped is-matched" data-id="1"><div class="card-inner"><div class="card-face card-front">1</div><div class="card-face card-back">Apple</div></div></div><div class="card-container is-flipped is-matched" data-id="0"><div class="card-inner"><div class="card-face card-front">2</div><div class="card-face card-back">Apple</div></div></div><div class="card-container is-flipped is-matched" data-id="2"><div class="card-inner"><div class="card-face card-front">3</div><div class="card-face card-back">Apple</div></div></div><div class="card-container is-flipped is-matched" data-id="2"><div class="card-inner"><div class="card-face card-front">4</div><div class="card-face card-back">Apple</div></div></div><div class="card-container is-flipped is-matched" data-id="0"><div class="card-inner"><div class="card-face card-front">5</div><div class="card-face card-back">Apple</div></div></div><div class="card-container is-flipped is-matched" data-id="1"><div class="card-inner"><div class="card-face card-front">6</div><div class="card-face card-back">Apple</div></div></div></div>
            <div class="game-controls">
                <button class="btn btn-back" onclick="showCreator()">⬅ Edit Game</button>
                <button class="btn btn-save-file" onclick="exportCurrentGame()">📥 Save Game File</button>
            </div>
        </div>
    </div>

    <script id="preloadedData">const preloadedPairs = [{"a":"Apple","b":"Apple"},{"a":"Apple","b":"Apple"},{"a":"Apple","b":"Apple"}];</script>

    <script>
        let pairCount = 0;

        const correctSound = new Audio("https://actions.google.com/sounds/v1/cartoon/cartoon_wobble.ogg");
        const wrongSound = new Audio("https://actions.google.com/sounds/v1/cartoon/slide_whistle_down.ogg");
        const flipSound = new Audio("https://actions.google.com/sounds/v1/digital/soft_click.ogg");

        window.onload = function () {
            // အကယ်၍ အသေသိမ်းထားသော ဒေတာဟောင်းရှိပါက ၎င်းကို အလိုအလျောက် ထည့်သွင်းပြသမည်
            if (typeof preloadedPairs !== 'undefined' && preloadedPairs.length > 0) {
                preloadedPairs.forEach(pair => {
                    addNewPairRow(pair.a, pair.b);
                });
                generateGame(); // တိုက်ရိုက် ဂိမ်းထဲသို့ ဝင်ရောက်မည်
            } else {
                for (let i = 0; i < 3; i++) {
                    addNewPairRow();
                }
            }
        };

        function addNewPairRow(valA = '', valB = '') {
            pairCount++;
            const container = document.getElementById("wordInputsContainer");

            const row = document.createElement("div");
            row.classList.add("word-pair-row");
            row.id = `pairRow_${pairCount}`;

            row.innerHTML = `
                <span class="pair-number">Pair ${pairCount}</span>
                <input type="text" class="input-word-a" placeholder="Word (e.g. Apple)" value="${valA}">
                <input type="text" class="input-word-b" placeholder="Definition OR Image URL" value="${valB}">
                <button class="btn btn-delete" onclick="deletePairRow(${pairCount})">🗑</button>
            `;
            container.appendChild(row);
        }

        function deletePairRow(id) {
            const row = document.getElementById(`pairRow_${id}`);
            if (row) row.remove();
        }

        function showCreator() {
            document.getElementById("creatorPage").style.display = "block";
            document.getElementById("gamePage").style.display = "none";
        }

        function isImageUrl(text) {
            return text.startsWith("http://") || text.startsWith("https://") || text.includes("data:image");
        }

        let activePairsForExport = [];

        function generateGame() {
            const rows = document.querySelectorAll(".word-pair-row");
            let pairs = [];
            let isValid = true;
            activePairsForExport = [];

            rows.forEach((row, index) => {
                const inputA = row.querySelector(".input-word-a").value.trim();
                const inputB = row.querySelector(".input-word-b").value.trim();

                if (inputA && inputB) {
                    pairs.push({ id: index, a: inputA, b: inputB });
                    activePairsForExport.push({ a: inputA, b: inputB });
                } else if (inputA || inputB) {
                    isValid = false;
                }
            });

            if (!isValid || pairs.length === 0) {
                alert("Please fill both sides of the word pairs, or delete the empty rows!");
                return;
            }

            document.getElementById("creatorPage").style.display = "none";
            document.getElementById("gamePage").style.display = "block";

            const gameBoard = document.getElementById("gameBoard");
            gameBoard.innerHTML = "";

            let cardsData = [];
            pairs.forEach(pair => {
                cardsData.push({ id: pair.id, text: pair.a });
                cardsData.push({ id: pair.id, text: pair.b });
            });

            cardsData.sort(() => Math.random() - 0.5);

            let flippedCards = [];

            cardsData.forEach((data, index) => {
                const container = document.createElement("div");
                container.classList.add("card-container");
                container.dataset.id = data.id;

                const inner = document.createElement("div");
                inner.classList.add("card-inner");

                const front = document.createElement("div");
                front.classList.add("card-face", "card-front"); front.innerText = index + 1;

                const back = document.createElement("div");
                back.classList.add("card-face", "card-back");

                if (isImageUrl(data.text)) {
                    const img = document.createElement("img");
                    img.src = data.text;
                    img.alt = "Game Image";
                    back.appendChild(img);
                } else {
                    back.innerText = data.text;
                }

                inner.appendChild(front); inner.appendChild(back); container.appendChild(inner);

                container.onclick = function () {
                    if (container.classList.contains("is-flipped") || container.classList.contains("is-matched") || flippedCards.length === 2) return;

                    flipSound.play();
                    container.classList.add("is-flipped");
                    flippedCards.push(container);

                    if (flippedCards.length === 2) {
                        if (flippedCards[0].dataset.id === flippedCards[1].dataset.id) {
                            setTimeout(() => { correctSound.play(); }, 300);
                            flippedCards[0].classList.add("is-matched");
                            flippedCards[1].classList.add("is-matched");
                            flippedCards = [];
                        } else {
                            setTimeout(() => { wrongSound.play(); }, 400);
                            setTimeout(() => {
                                flippedCards[0].classList.remove("is-flipped");
                                flippedCards[1].classList.remove("is-flipped");
                                flippedCards = [];
                            }, 1000);
                        }
                    }
                };
                gameBoard.appendChild(container);
            });
        }

        /* --- အသစ်ထည့်သွင်းထားသော စနစ်: လက်ရှိ ဒေတာများကို ဖိုင်အဖြစ် အသေသိမ်းဆည်းပေးမည့် ကုဒ် --- */
        function exportCurrentGame() {
            const fileName = prompt("Enter a name for this game file:", "my-english-game");
            if (!fileName) return;

            // လက်ရှိ HTML တစ်ခုလုံး၏ ကုဒ်များကို ဖတ်ယူခြင်း
            let currentHtml = document.documentElement.outerHTML;

            // ဒေတာဟောင်းများကို ရှင်းလင်းပြီး ဒေတာအသစ်ဖြင့် အစားထိုးရန် စာသားပြင်ဆင်ခြင်း
            const dataString = `const preloadedPairs = ${JSON.stringify(activePairsForExport)};`;

            // <script id="preloadedData"> နေရာတွင် ဒေတာအသစ်ကို အစားထိုးထည့်သွင်းခြင်း
            const regex = /<script id="preloadedData">([\s\S]*?)<\/script>/;
            currentHtml = currentHtml.replace(regex, `<script id="preloadedData">${dataString}<\/script>`);

            // ဖိုင်အဖြစ် အလိုအလျောက် ဒေါင်းလုဒ်လုပ်ပေးခြင်း
            const blob = new Blob(["<!DOCTYPE html>\n" + currentHtml], { type: "text/html" });
            const a = document.createElement("a");
            a.href = URL.createObjectURL(blob);
            a.download = `${fileName}.html`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
        }
    </script>


</body></html>
