<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PlayStation 4 - Educational Emulator</title>
    <style>
        /* CSS: PS4 Blue Gradient Theme */
        html,
        body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
            background: radial-gradient(circle at center, #0a3d70 0%, #03162b 100%);
            color: #ffffff;
            overflow: hidden;
            user-select: none;
        }

        .ps4-bg-glow {
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(0, 122, 255, 0.15) 0%, transparent 70%);
            top: -100px;
            left: -100px;
            animation: floatGlow 8s infinite alternate ease-in-out;
            pointer-events: none;
        }

        @keyframes floatGlow {
            0% {
                transform: translate(0, 0) scale(1);
            }

            100% {
                transform: translate(100px, 50px) scale(1.2);
            }
        }

        .console-wrapper {
            width: 100%;
            height: 100%;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            box-sizing: border-box;
            padding: 40px 60px;
        }

        .ps4-top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 16px;
            font-weight: 300;
            letter-spacing: 1px;
            color: rgba(255, 255, 255, 0.7);
        }

        .ps4-user-profile {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .avatar-dot {
            width: 12px;
            height: 12px;
            background-color: #2ecc71;
            border-radius: 50%;
            box-shadow: 0 0 8px #2ecc71;
        }

        .ps4-main-content {
            margin: auto 0;
            position: relative;
        }

        .system-title {
            font-size: 26px;
            font-weight: bold;
            margin-bottom: 25px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .game-carousel {
            display: flex;
            gap: 25px;
            overflow-x: auto;
            padding: 20px 10px;
            scroll-behavior: smooth;
            box-sizing: border-box;
        }

        .game-carousel::-webkit-scrollbar {
            display: none;
        }

        /* PS4 Disc Card */
        .insert-disc-card {
            min-width: 180px;
            height: 180px;
            background: rgba(255, 255, 255, 0.06);
            border: 2px dashed rgba(255, 255, 255, 0.3);
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.2s;
            text-align: center;
            box-sizing: border-box;
            padding: 15px;
        }

        .insert-disc-card:hover {
            border-color: #007aff;
            background: rgba(0, 122, 255, 0.1);
            transform: scale(1.03);
            box-shadow: 0 10px 20px rgba(0, 122, 255, 0.2);
        }

        .disc-icon {
            font-size: 40px;
            margin-bottom: 10px;
            animation: spinDisc 4s infinite linear;
        }

        @keyframes spinDisc {
            100% {
                transform: rotate(360deg);
            }
        }

        .ps4-game-card {
            min-width: 180px;
            height: 180px;
            background: linear-gradient(135deg, #1f4068, #162447);
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 20px;
            box-sizing: border-box;
            cursor: pointer;
            transition: 0.25s cubic-bezier(0.1, 0.8, 0.3, 1);
            position: relative;
            box-shadow: 0 8px 15px rgba(0, 0, 0, 0.4);
        }

        .ps4-game-card:hover {
            border-color: #007aff;
            transform: scale(1.08) translateY(-10px);
            box-shadow: 0 15px 30px rgba(0, 122, 255, 0.4), 0 0 15px #007aff;
        }

        .game-badge {
            position: absolute;
            top: 12px;
            right: 12px;
            font-size: 10px;
            font-weight: bold;
            background: #007aff;
            padding: 3px 8px;
            border-radius: 4px;
            text-transform: uppercase;
        }

        .game-card-title {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 5px;
            word-break: break-word;
        }

        .game-card-type {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.5);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .ps4-bottom-bar {
            display: flex;
            gap: 30px;
            font-size: 15px;
            color: rgba(255, 255, 255, 0.6);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            padding-top: 20px;
        }

        .nav-hint {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .ps-btn-icon {
            width: 22px;
            height: 22px;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: bold;
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: #fff;
        }

        .ps-btn-x {
            background: #007aff;
            border-color: #007aff;
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.5);
        }

        /* UNIVERSAL SCREEN RUNTIME OVERLAY */
        .game-runtime-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1000;
            box-sizing: border-box;
        }

        .game-arena {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            box-sizing: border-box;
        }

        /* ENGINE 1: MATCH UP SCREEN DESIGN */
        .match-bg {
            background-color: #cd853f;
            background-image: linear-gradient(45deg, #8b4513 25%, transparent 25%), linear-gradient(-45deg, #8b4513 25%, transparent 25%), linear-gradient(45deg, transparent 75%, #8b4513 75%), linear-gradient(-45deg, transparent 75%, #8b4513 75%);
            background-size: 100px 100px;
            box-shadow: inset 0 0 100px rgba(0, 0, 0, 0.7);
        }

        .scoreboard {
            display: flex;
            width: 90%;
            max-width: 1200px;
            justify-content: space-around;
            background: rgba(44, 62, 80, 0.95);
            padding: 15px;
            border-radius: 10px;
            border: 2px solid #ffffff;
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.4);
            color: white;
        }

        .team-score-card {
            padding: 5px 20px;
            border-radius: 8px;
            min-width: 150px;
            text-align: center;
        }

        .team-score-card.active-turn {
            background: #e67e22;
            box-shadow: 0 0 15px #e67e22;
        }

        .score-num {
            font-size: 32px;
            font-weight: bold;
            margin-top: 5px;
        }

        .match-container {
            display: none;
            grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
            gap: 15px;
            width: 90%;
            max-width: 1100px;
            margin: auto;
            perspective: 1200px;
            justify-content: center;
        }

        .card-container {
            height: 125px;
            perspective: 1200px;
            cursor: pointer;
            position: relative;
        }

        .card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            text-align: center;
            transition: transform 0.5s;
            transform-style: preserve-3d;
            box-shadow: 0 8px 15px rgba(0, 0, 0, 0.5);
            border-radius: 10px;
        }

        .card-container.is-flipped .card-inner {
            transform: rotateY(180deg);
        }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            box-sizing: border-box;
            padding: 10px;
        }

        .card-front {
            background-color: #4a2711;
            background-image: linear-gradient(0deg, #3d1f0d 0%, #573018 100%);
            color: #f1c40f;
            font-size: 36px;
            border: 2px solid #2b1407;
        }

        .card-back {
            background: linear-gradient(135deg, #1abc9c, #2ecc71);
            color: white;
            font-size: 18px;
            transform: rotateY(180deg);
            word-break: break-word;
            overflow: hidden;
            border: 2px solid #ffffff;
        }

        .card-back img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            background: white;
            border-radius: 6px;
        }

        .feedback-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 70px;
            font-weight: bold;
            opacity: 0;
        }

        .feedback-correct {
            color: #2ecc71;
        }

        .feedback-wrong {
            color: #e74c3c;
        }

        .card-container.fall-down .card-inner {
            animation: fallAnim 0.5s forwards;
        }

        @keyframes fallAnim {
            100% {
                transform: rotateY(180deg) translateY(400px);
                opacity: 0;
            }
        }

        /* ENGINE 2: SPIN WHEEL SCREEN DESIGN (ဆရာ့ရဲ့ စိတ်ကြိုက် 3D Ferris Wheel ပုံစံအမှန်) */
        .spin-bg {
            background: radial-gradient(circle at center, #1e3c72 0%, #2a5298 100%);
        }

        .spin-container {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin: auto;
            position: relative;
            width: 100%;
        }

        .ferris-wheel-frame {
            position: relative;
            width: 540px;
            height: 500px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .wheel-wrapper {
            position: absolute;
            top: 10px;
            width: 400px;
            height: 400px;
            border-radius: 50%;
            border: 10px solid #ffffff;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5), inset 0 4px 8px rgba(255, 255, 255, 0.6), inset 0 -4px 8px rgba(0, 0, 0, 0.4);
            background: #ffffff;
            z-index: 10;
        }

        #wheelCanvas {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            transition: transform 0s cubic-bezier(0.1, 0.85, 0.25, 1);
            filter: drop-shadow(0 6px 10px rgba(0, 0, 0, 0.3));
        }

        /* 3D Legs */
        .ferris-iron-leg-left {
            position: absolute;
            bottom: -30px;
            left: 145px;
            width: 14px;
            height: 310px;
            background: linear-gradient(to right, #bdc3c7 0%, #ffffff 30%, #95a5a6 70%, #7f8c8d 100%);
            transform: rotate(20deg);
            transform-origin: bottom center;
            z-index: 5;
            border-radius: 4px;
            border: 1px solid #7f8c8d;
            box-shadow: -6px 5px 12px rgba(0, 0, 0, 0.4);
        }

        .ferris-iron-leg-right {
            position: absolute;
            bottom: -30px;
            right: 145px;
            width: 14px;
            height: 310px;
            background: linear-gradient(to right, #bdc3c7 0%, #ffffff 30%, #95a5a6 70%, #7f8c8d 100%);
            transform: rotate(-20deg);
            transform-origin: bottom center;
            z-index: 5;
            border-radius: 4px;
            border: 1px solid #7f8c8d;
            box-shadow: 8px 5px 12px rgba(0, 0, 0, 0.4);
        }

        .leg-foot-left {
            position: absolute;
            bottom: -40px;
            left: 122px;
            width: 32px;
            height: 12px;
            background: linear-gradient(to bottom, #bdc3c7, #7f8c8d);
            border-radius: 3px;
            z-index: 6;
            border: 1px solid #5d6d7e;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.4);
        }

        .leg-foot-right {
            position: absolute;
            bottom: -40px;
            right: 122px;
            width: 32px;
            height: 12px;
            background: linear-gradient(to bottom, #bdc3c7, #7f8c8d);
            border-radius: 3px;
            z-index: 6;
            border: 1px solid #5d6d7e;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.4);
        }

        /* Long Right Pointer */
        .wheel-pointer-right {
            position: absolute;
            top: 210px;
            right: 40px;
            transform: translateY(-50%);
            width: 0;
            height: 0;
            border-top: 20px solid transparent;
            border-bottom: 20px solid transparent;
            border-right: 55px solid #e74c3c;
            z-index: 30;
            filter: drop-shadow(-4px 4px 6px rgba(0, 0, 0, 0.5));
        }

        .center-hub {
            position: absolute;
            top: 210px;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 70px;
            height: 70px;
            background: radial-gradient(circle, #ffffff 30%, #cbd5e1 70%, #7f8c8d 100%);
            border: 4px solid #95a5a6;
            border-radius: 50%;
            box-shadow: 0 6px 15px rgba(0, 0, 0, 0.4);
            z-index: 40;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .spin-trigger-btn {
            width: 54px;
            height: 54px;
            background: linear-gradient(135deg, #f39c12 0%, #e67e22 50%, #d35400 100%);
            border: none;
            border-radius: 50%;
            color: white;
            font-size: 13px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: inset 0 2px 4px rgba(255, 255, 255, 0.4), 0 4px 8px rgba(0, 0, 0, 0.3);
        }

        /* Spin PopUp Text Display Box */
        .spin-result-popup {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #ffffff;
            color: #2c3e50;
            padding: 30px 60px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.6);
            z-index: 2000;
            border: 4px solid #f1c40f;
            min-width: 250px;
        }

        .spin-result-popup h3 {
            margin: 0;
            font-size: 18px;
            color: #7f8c8d;
            text-transform: uppercase;
        }

        .spin-result-popup div {
            font-size: 42px;
            font-weight: bold;
            margin-top: 10px;
            color: #2c3e50;
            word-break: break-word;
        }

        .btn-close-spin-popup {
            margin-top: 20px;
            background: #2c3e50;
            color: white;
            padding: 10px 25px;
            font-weight: bold;
            border-radius: 6px;
            border: none;
            cursor: pointer;
        }

        .runtime-controls {
            width: 100%;
            display: flex;
            justify-content: center;
            gap: 20px;
            z-index: 100;
        }

        .btn-console {
            padding: 12px 25px;
            font-size: 16px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            border: none;
            background: #e74c3c;
            color: white;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
        }

        .overlay-mask {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1500;
        }
    </style>
</head>

<body>

    <div class="ps4-bg-glow"></div>

    <div class="console-wrapper" id="consoleHome">
        <div class="ps4-top-bar">
            <div class="ps4-user-profile">
                <div class="avatar-dot"></div>
                <span>Teacher De Ku & Minn (Online)</span>
            </div>
            <div id="liveClock">07:30 PM</div>
        </div>

        <div class="ps4-main-content">
            <div class="system-title" id="focusedGameTitle">Insert Game Disc</div>
            <div class="game-carousel" id="gameLibraryContainer">
                <div class="insert-disc-card" onclick="document.getElementById('romUploader').click()">
                    <div class="disc-icon">💿</div>
                    <div style="font-weight: bold; font-size: 14px;">Insert Game ROM</div>
                    <input type="file" id="romUploader" style="display:none;" accept=".txt"
                        onchange="loadGameRomConsole(event)">
                </div>
            </div>
        </div>

        <div class="ps4-bottom-bar">
            <div class="nav-hint">
                <div class="ps-btn-icon ps-btn-x">X</div><span>Select / Boot Game</span>
            </div>
            <div class="nav-hint">
                <div class="ps-btn-icon">💡</div><span>Console System: Select any exported game text file</span>
            </div>
        </div>
    </div>

    <div class="game-runtime-overlay" id="runtimeArena">
        <div class="game-arena" id="arenaStyleFrame">
            <div class="scoreboard">
                <div class="team-score-card active-turn" id="scoreCard1">
                    <div>Player / Team A</div>
                    <div class="score-num" id="scoreNum1">0</div>
                </div>
                <div class="team-score-card" id="scoreCard2" style="display:none;">
                    <div>Team B</div>
                    <div class="score-num" id="scoreNum2">0</div>
                </div>
            </div>

            <div class="match-container" id="matchUpEngineView"></div>

            <div class="spin-container" id="spinWheelEngineView">
                <div class="ferris-wheel-frame">
                    <div class="ferris-iron-leg-left"></div>
                    <div class="ferris-iron-leg-right"></div>
                    <div class="leg-foot-left"></div>
                    <div class="leg-foot-right"></div>
                    <div class="wheel-wrapper"><canvas id="wheelCanvas"></canvas></div>
                    <div class="wheel-pointer-right"></div>
                    <div class="center-hub"><button class="spin-trigger-btn"
                            onclick="triggerConsoleWheelSpin()">SPIN</button></div>
                </div>
            </div>

            <div class="runtime-controls">
                <button class="btn-console" onclick="powerOffCurrentGame()">🎮 Power Off (Back to Dashboard)</button>
            </div>
        </div>
    </div>

    <div class="overlay-mask" id="mask"></div>
    <div class="spin-result-popup" id="spinResultBox">
        <h3>Selected Item</h3>
        <div id="spinResultValue">-</div>
        <button class="btn-close-spin-popup" onclick="closeConsoleSpinPopup()">OK</button>
    </div>

    <script>
        let installedGames = [];
        let activePairsData = [];
        let flippedCards = [];
        let matchesFound = 0; let totalMatches = 0;

        // Spin Wheel States Inside Console
        let wheelSegments = []; let currentRotationAngle = 0; let isSpinning = false;

        // Unified Synthesizer Sound Engine Node
        const SoundFX = {
            ctx: null,
            init() { if (!this.ctx) { this.ctx = new (window.AudioContext || window.webkitAudioContext)(); } if (this.ctx.state === 'suspended') this.ctx.resume(); },
            playFlip() { this.init(); const osc = this.ctx.createOscillator(); const gain = this.ctx.createGain(); osc.type = 'sine'; osc.frequency.setValueAtTime(550, this.ctx.currentTime); gain.gain.setValueAtTime(0.04, this.ctx.currentTime); gain.gain.linearRampToValueAtTime(0.001, this.ctx.currentTime + 0.08); osc.connect(gain); gain.connect(this.ctx.destination); osc.start(); osc.stop(this.ctx.currentTime + 0.08); },
            playWin() { this.init(); const t = this.ctx.currentTime; const tone = (f, s, d) => { const o = this.ctx.createOscillator(); const g = this.ctx.createGain(); o.type = 'square'; o.frequency.setValueAtTime(f, s); g.gain.setValueAtTime(0.05, s); g.gain.linearRampToValueAtTime(0.001, s + d); o.connect(g); g.connect(this.ctx.destination); o.start(s); o.stop(s + d); }; tone(523.25, t, 0.1); tone(659.25, t + 0.1, 0.1); tone(783.99, t + 0.2, 0.3); },
            playLose() { this.init(); const o = this.ctx.createOscillator(); const g = this.ctx.createGain(); o.type = 'sawtooth'; o.frequency.setValueAtTime(150, this.ctx.currentTime); g.gain.setValueAtTime(0.08, this.ctx.currentTime); g.gain.linearRampToValueAtTime(0.001, this.ctx.currentTime + 0.4); o.connect(g); g.connect(this.ctx.destination); o.start(); o.stop(this.ctx.currentTime + 0.4); }
        };

        setInterval(() => { const d = new Date(); document.getElementById("liveClock").innerText = d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }); }, 1000);

        function loadGameRomConsole(e) {
            const file = e.target.files[0]; if (!file) return;
            const reader = new FileReader();
            reader.onload = function (evt) {
                try {
                    const rom = JSON.parse(evt.target.result);
                    if (!rom.gameType || !rom.pairs) throw new Error();
                    installedGames.push(rom);
                    renderGameLibraryCarousel();
                    alert(`🎮 "${rom.title.toUpperCase()}" Installed to Dashboard Successfully!`);
                } catch (err) { alert("❌ Disc Read Error: Invalid Game File Format!"); }
            };
            reader.readAsText(file);
        }

        function renderGameLibraryCarousel() {
            const container = document.getElementById("gameLibraryContainer");
            const loaderHtml = container.firstElementChild.outerHTML; container.innerHTML = loaderHtml;

            installedGames.forEach((game, index) => {
                const card = document.createElement("div"); card.classList.add("ps4-game-card");
                card.innerHTML = `<div class="game-badge">Ready</div><div class="game-card-title">${game.title}</div><div class="game-card-type">Engine: ${game.gameType.replace('_', ' ')}</div>`;
                card.onclick = () => bootSelectedGameEngine(index);
                container.appendChild(card);
            });
            if (installedGames.length > 0) { document.getElementById("focusedGameTitle").innerText = installedGames[installedGames.length - 1].title; }
        }

        function bootSelectedGameEngine(index) {
            const game = installedGames[index];
            activePairsData = game.pairs;

            document.getElementById("consoleHome").style.display = "none";
            document.getElementById("runtimeArena").style.display = "block";

            const frame = document.getElementById("arenaStyleFrame");

            // --- 🛠 ပရောဂျက်အလိုက် အင်ဂျင်ခွဲခြားမောင်းနှင်မှုစနစ် ---
            if (game.gameType === 'match_up') {
                frame.className = "game-arena match-bg";
                document.getElementById("matchUpEngineView").style.display = "grid";
                document.getElementById("spinWheelEngineView").style.display = "none";
                runMatchUpEngineView();
            } else if (game.gameType === 'spin_wheel') {
                frame.className = "game-arena spin-bg";
                document.getElementById("matchUpEngineView").style.display = "none";
                document.getElementById("spinWheelEngineView").style.display = "flex";

                // Spin Wheel ဒေတာများ တပ်ဆင်ခြင်း
                wheelSegments = activePairsData.map(p => p.a);
                currentRotationAngle = 0;
                document.getElementById("wheelCanvas").style.transform = `rotate(0deg)`;

                drawConsoleWheelGraphic();
            }
        }

        /* ==================== ENGINE MODULE 1: MATCH UP ==================== */
        function runMatchUpEngineView() {
            const board = document.getElementById("matchUpEngineView"); board.innerHTML = ""; flippedCards = []; matchesFound = 0; totalMatches = activePairsData.length;
            let cards = []; activePairsData.forEach((pair, idx) => { cards.push({ id: idx, text: pair.a }); cards.push({ id: idx, text: pair.b }); });
            cards.sort(() => Math.random() - 0.5);
            cards.forEach((data, index) => {
                const container = document.createElement("div"); container.classList.add("card-container"); container.dataset.id = data.id;
                const inner = document.createElement("div"); inner.classList.add("card-inner");
                const front = document.createElement("div"); front.classList.add("card-face", "card-front"); front.innerText = index + 1;
                const back = document.createElement("div"); back.classList.add("card-face", "card-back");
                if (data.text.startsWith("http")) { back.innerHTML = `<img src="${data.text}">`; } else { back.innerText = data.text; }
                const cO = document.createElement("div"); cO.classList.add("feedback-overlay", "feedback-correct"); cO.innerText = "✓";
                const wO = document.createElement("div"); wO.classList.add("feedback-overlay", "feedback-wrong"); wO.innerText = "✗";
                back.appendChild(cO); back.appendChild(wO); inner.appendChild(front); inner.appendChild(back); container.appendChild(inner);
                container.onclick = function () {
                    if (container.classList.contains("is-flipped") || container.classList.contains("fall-down") || flippedCards.length === 2) return;
                    SoundFX.playFlip(); container.classList.add("is-flipped"); flippedCards.push(container);
                    if (flippedCards.length === 2) { setTimeout(checkMatchLogicConsole, 400); }
                };
                board.appendChild(container);
            });
        }

        function checkMatchLogicConsole() {
            const [c1, c2] = flippedCards;
            if (c1.dataset.id === c2.dataset.id) {
                c1.querySelector(".feedback-correct").style.opacity = "1"; c2.querySelector(".feedback-correct").style.opacity = "1";
                SoundFX.playWin(); matchesFound++;
                setTimeout(() => { c1.classList.add("fall-down"); c2.classList.add("fall-down"); flippedCards = []; if (matchesFound === totalMatches) { alert("🏆 Victory! Match Up Game Completed!"); powerOffCurrentGame(); } }, 600);
            } else {
                c1.querySelector(".feedback-wrong").style.opacity = "1"; c2.querySelector(".feedback-wrong").style.opacity = "1";
                SoundFX.playLose();
                setTimeout(() => { c1.querySelector(".feedback-wrong").style.opacity = "0"; c2.querySelector(".feedback-wrong").style.opacity = "0"; c1.classList.remove("is-flipped"); c2.classList.remove("is-flipped"); flippedCards = []; }, 1000);
            }
        }

        /* ==================== ENGINE MODULE 2: FERRIS SPIN WHEEL ==================== */
        function drawConsoleWheelGraphic() {
            const canvas = document.getElementById("wheelCanvas"); const ctx = canvas.getContext("2d");
            canvas.width = 600; canvas.height = 600;
            const numSegs = wheelSegments.length;
            const arcSize = (2 * Math.PI) / numSegs;
            const segmentColors = ["#1abc9c", "#2ecc71", "#3498db", "#9b59b6", "#f1c40f", "#e67e22", "#e74c3c", "#34495e", "#16a085", "#27ae60", "#2980b9", "#8e44ad"];

            ctx.clearRect(0, 0, 600, 600);
            for (let i = 0; i < numSegs; i++) {
                ctx.beginPath(); ctx.moveTo(300, 300); ctx.arc(300, 300, 295, i * arcSize, (i + 1) * arcSize);
                ctx.fillStyle = segmentColors[i % segmentColors.length]; ctx.fill();
                ctx.lineWidth = 2; ctx.strokeStyle = "#ffffff"; ctx.stroke();

                ctx.save(); ctx.translate(300, 300); ctx.rotate((i + 0.5) * arcSize);
                ctx.fillStyle = "white"; ctx.font = "bold 22px Segoe UI"; ctx.textAlign = "right";
                let text = wheelSegments[i]; if (text.length > 15) text = text.substring(0, 13) + "..";
                ctx.fillText(text, 260, 8); ctx.restore();
            }
            const gradient = ctx.createRadialGradient(240, 240, 40, 300, 300, 295);
            gradient.addColorStop(0, 'rgba(255, 255, 255, 0.12)'); gradient.addColorStop(0.6, 'rgba(0, 0, 0, 0)'); gradient.addColorStop(1, 'rgba(0, 0, 0, 0.3)');
            ctx.fillStyle = gradient; ctx.beginPath(); ctx.arc(300, 300, 295, 0, 2 * Math.PI); ctx.fill();
        }

        function triggerConsoleWheelSpin() {
            if (isSpinning || wheelSegments.length === 0) return;
            isSpinning = true; SoundFX.init();

            let spinSeconds = 15; // Console စံနှုန်း ၁၅ စက္ကန့်ထားခြင်း
            const canvas = document.getElementById("wheelCanvas");
            canvas.style.transition = `transform ${spinSeconds}s cubic-bezier(0.1, 0.85, 0.25, 1)`;

            const numSegs = wheelSegments.length;
            const totalDegreesToRotate = 360 * (spinSeconds * 1.2) + Math.floor(Math.random() * 360);
            currentRotationAngle += totalDegreesToRotate;
            canvas.style.transform = `rotate(${currentRotationAngle}deg)`;

            let startTimestamp = null; let lastSegmentIdx = -1;

            function playConsoleDynamicAudio(timestamp) {
                if (!startTimestamp) startTimestamp = timestamp;
                let elapsed = (timestamp - startTimestamp) / 1000;
                if (elapsed >= spinSeconds) return;

                let progress = elapsed / spinSeconds;
                let easeOutFactor = 1 - Math.pow(1 - progress, 3);
                let currentPosDegrees = (currentRotationAngle - totalDegreesToRotate) + (totalDegreesToRotate * easeOutFactor);
                let currentSegmentIdx = Math.floor(((360 - (currentPosDegrees % 360)) % 360) / (360 / numSegs));

                if (currentSegmentIdx !== lastSegmentIdx) {
                    try {
                        const osc = SoundFX.ctx.createOscillator(); const gain = SoundFX.ctx.createGain();
                        osc.type = 'sine'; osc.frequency.setValueAtTime(550, SoundFX.ctx.currentTime);
                        gain.gain.setValueAtTime(0.04, SoundFX.ctx.currentTime); gain.gain.linearRampToValueAtTime(0.001, SoundFX.ctx.currentTime + 0.03);
                        osc.connect(gain); gain.connect(SoundFX.ctx.destination); osc.start(); osc.stop(SoundFX.ctx.currentTime + 0.03);
                    } catch (e) { }
                    lastSegmentIdx = currentSegmentIdx;
                }
                if (isSpinning) requestAnimationFrame(playConsoleDynamicAudio);
            }
            requestAnimationFrame(playConsoleDynamicAudio);

            setTimeout(() => {
                isSpinning = false;
                let netDegrees = currentRotationAngle % 360;
                let winningIndex = Math.floor(((360 - netDegrees) % 360) / (360 / numSegs));
                if (winningIndex < 0) winningIndex = 0; if (winningIndex >= numSegs) winningIndex = numSegs - 1;

                // ရလဒ် ပေါပ်အပ်ပြသခြင်း
                SoundFX.playWin();
                document.getElementById("spinResultValue").innerText = wheelSegments[winningIndex];
                document.getElementById("mask").style.display = "block";
                document.getElementById("spinResultBox").style.display = "block";
            }, spinSeconds * 1000);
        }

        function closeConsoleSpinPopup() { document.getElementById("mask").style.display = "none"; document.getElementById("spinResultBox").style.display = "none"; }
        function powerOffCurrentGame() { document.getElementById("consoleHome").style.display = "flex"; document.getElementById("runtimeArena").style.display = "none"; }
    </script>
